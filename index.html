<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOSC Consulting</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1A3234;
    min-height: 100vh;
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    padding: 28px 20px 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .logo-area { display: flex; justify-content: center; padding-bottom: 4px; }
  .logo-area img { width: 160px; height: auto; display: block; }
  .divider { width: 40px; height: 2px; background: #D0FF73; border-radius: 2px; opacity: 0.6; }
  .btn-row { display: flex; flex-direction: column; gap: 12px; width: 100%; margin-top: 2px; }
  .btn {
    display: flex; align-items: center; gap: 14px;
    padding: 15px 18px; border-radius: 12px;
    text-decoration: none; border: none; width: 100%; cursor: pointer;
  }
  .btn-primary { background: #D0FF73; }
  .btn-secondary { background: transparent; border: 1.5px solid rgba(208,255,115,0.4); }
  .btn-icon {
    width: 38px; height: 38px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .btn-primary .btn-icon { background: rgba(26,50,52,0.18); }
  .btn-secondary .btn-icon { background: rgba(208,255,115,0.12); }
  .btn-text { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
  .btn-title { font-size: 14px; font-weight: 500; line-height: 1.2; }
  .btn-subtitle { font-size: 11px; font-weight: 400; line-height: 1.2; opacity: 0.65; }
  .btn-primary .btn-title, .btn-primary .btn-subtitle { color: #1A3234; }
  .btn-secondary .btn-title { color: #EBFEF8; }
  .btn-secondary .btn-subtitle { color: #EBFEF8; }
  .btn-arrow { margin-left: auto; flex-shrink: 0; font-size: 18px; }
  .btn-primary .btn-arrow { color: #1A3234; opacity: 0.4; }
  .btn-secondary .btn-arrow { color: #D0FF73; opacity: 0.6; }
  .section-label {
    font-size: 10px; font-weight: 500; letter-spacing: 2px;
    color: #D0FF73; text-transform: uppercase; opacity: 0.8; margin-bottom: 12px;
  }
  .contacts-grid { display: flex; flex-direction: column; gap: 12px; width: 100%; }
  .contact-card { background: #EBFEF8; border-radius: 14px; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .contact-header { display: flex; align-items: center; gap: 12px; }
  .contact-photo { width: 52px; height: 52px; border-radius: 50%; border: 2px solid #D0FF73; object-fit: cover; flex-shrink: 0; }
  .contact-name { font-size: 14px; font-weight: 600; color: #1A3234; line-height: 1.3; }
  .contact-role { font-size: 11px; font-weight: 400; color: #1A3234; opacity: 0.55; margin-top: 2px; }
  .contact-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .contact-action {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 10px 6px 8px; border-radius: 9px; background: #1A3234;
    text-decoration: none; border: none; cursor: pointer;
  }
  .contact-action-label { font-size: 10px; font-weight: 400; color: #EBFEF8; opacity: 0.7; }
  .footer { font-size: 10px; color: #EBFEF8; opacity: 0.3; letter-spacing: 1px; text-align: center; margin-top: 4px; }
</style>
</head>
